<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Training Assist</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
            max-width: 650px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #ffcc00;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-top: 0;
        }
        /* Diseño de la cuadrícula */
        .stat-grid {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1.5fr 1fr;
            gap: 15px;
            align-items: center;
            margin-bottom: 12px;
        }
        .header-row {
            font-weight: bold;
            color: #aaa;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
            text-align: center;
        }
        .stat-name {
            font-weight: bold;
            font-size: 1.1em;
            text-align: left;
        }
        /* Colores de las stats */
        .color-ps { color: #FF5959; }
        .color-atk { color: #F5AC78; }
        .color-def { color: #FAE078; }
        .color-spa { color: #9DB7F5; }
        .color-spd { color: #A7DB8D; }
        .color-spe { color: #FA92B2; }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            background-color: #2d2d2d;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            text-align: center;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #3b4cca;
        }
        .vp-cost {
            text-align: right;
            color: #4CAF50;
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
        }
        
        /* Panel de Extras */
        .extras-panel {
            background-color: #262626;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .extras-title {
            margin-top: 0;
            color: #aaa;
            font-size: 0.9em;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .extra-item {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .extra-item label {
            cursor: pointer;
            font-size: 1em;
            display: flex;
            align-items: center;
        }
        .extra-item input[type="checkbox"] {
            margin-right: 12px;
            transform: scale(1.3);
            cursor: pointer;
            accent-color: #e3350d;
        }
        .moves-input {
            width: 70px !important;
            padding: 5px !important;
            margin-left: 10px;
        }

        /* Panel de Totales Limpio */
        .totals-panel {
            margin-top: 20px;
            padding: 15px;
            background-color: #1a1a1a;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 1.1em;
            border-top: 3px solid #555;
            transition: border-color 0.3s;
        }
        .totals-panel span { font-weight: bold; color: #ffcc00; transition: color 0.3s; }

        /* Clases dinámicas de error para el límite de 66 SP */
        .error-limit { color: #ff4444 !important; }
        .panel-error { border-top-color: #ff4444 !important; }
        
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #e3350d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #b32a0a; }
    </style>
</head>
<body>

<div class="container">
    <h2>EVS to SP Converter</h2>

    <div class="stat-grid header-row">
        <div style="text-align: left;">STAT</div>
        <div>Evs Value <br><span style="font-size:0.8em; font-weight:normal;">(ninth gen / earlier)</span></div>
        <div>SP value <br><span style="font-size:0.8em; font-weight:normal;">(Champions)</span></div>
        <div style="text-align: right;">VP Cost</div>
    </div>

    <div id="statsContainer"></div>

    <div class="extras-panel">
        <h3 class="extras-title">Extra VP Costs</h3>
        <div class="extra-item">
            <label>
                <input type="checkbox" id="chkAbility" onchange="actualizarTotales()">
                Change Ability (+500 VP)
            </label>
        </div>
        <div class="extra-item">
            <label>
                <input type="checkbox" id="chkNature" onchange="actualizarTotales()">
                Change Nature (+500 VP)
            </label>
        </div>
        <div class="extra-item">
            <label>
                Moves to learn (+250 VP each):
                <input type="number" id="numMoves" class="moves-input" min="0" max="4" value="0" oninput="actualizarTotales()">
            </label>
        </div>
    </div>

    <div class="totals-panel" id="mainTotalsPanel">
        <div>Total EVs: <span id="sumaEVs">0</span></div>
        <div>Total SP: <span id="sumaSPs">0</span> <span id="warningSP" style="color: #ff4444; font-size: 0.8em; margin-left: 5px; display: none;">(Max 66!)</span></div>
        <div>Total VP: <span id="sumaVPs">0</span> VP</div>
    </div>

    <button onclick="reiniciarStats()">Clear All</button>
</div>

<script>
    const stats = [
        { id: 'ps', name: 'HP', color: 'color-ps' },
        { id: 'atk', name: 'Atk', color: 'color-atk' },
        { id: 'def', name: 'Def', color: 'color-def' },
        { id: 'spa', name: 'Sp.Atk', color: 'color-spa' },
        { id: 'spd', name: 'Sp.Def', color: 'color-spd' },
        { id: 'spe', name: 'Spd', color: 'color-spe' }
    ];

    function inicializarCuadricula() {
        const container = document.getElementById('statsContainer');
        stats.forEach((stat, index) => {
            const row = document.createElement('div');
            row.className = 'stat-grid';
            row.innerHTML = `
                <div class="stat-name ${stat.color}">${stat.name}</div>
                <div><input type="number" id="ev_${index}" min="0" max="252" placeholder="e.g, 252" oninput="desdeEV(${index})"></div>
                <div><input type="number" id="sp_${index}" min="0" max="32" placeholder="e.g, 32" oninput="desdeSP(${index})"></div>
                <div class="vp-cost" id="vp_${index}">0 VP</div>
            `;
            container.appendChild(row);
        });
    }

    function desdeEV(index) {
        let evs = parseInt(document.getElementById(`ev_${index}`).value);
        let cajaSP = document.getElementById(`sp_${index}`);
        let cajaVP = document.getElementById(`vp_${index}`);

        if (isNaN(evs)) {
            cajaSP.value = "";
            cajaVP.innerText = "0 VP";
            actualizarTotales();
            return;
        }

        if (evs > 252) { evs = 252; document.getElementById(`ev_${index}`).value = 252; }
        if (evs < 0) evs = 0;

        let sp = 0;
        if (evs >= 4) sp = Math.floor((evs - 4) / 8) + 1;
        if (sp > 32) sp = 32;

        cajaSP.value = sp;
        cajaVP.innerText = (sp * 5) + " VP";
        actualizarTotales();
    }

    function desdeSP(index) {
        let sp = parseInt(document.getElementById(`sp_${index}`).value);
        let cajaEV = document.getElementById(`ev_${index}`);
        let cajaVP = document.getElementById(`vp_${index}`);

        if (isNaN(sp)) {
            cajaEV.value = "";
            cajaVP.innerText = "0 VP";
            actualizarTotales();
            return;
        }

        if (sp > 32) { sp = 32; document.getElementById(`sp_${index}`).value = 32; }
        if (sp < 0) sp = 0;

        let evs = 0;
        if (sp > 0) evs = ((sp - 1) * 8) + 4;
        if (evs > 252) evs = 252;

        cajaEV.value = evs;
        cajaVP.innerText = (sp * 5) + " VP";
        actualizarTotales();
    }

    function actualizarTotales() {
        let sumaEV = 0, sumaSP = 0, sumaVP = 0;
        
        for (let i = 0; i < 6; i++) {
            let ev = parseInt(document.getElementById(`ev_${i}`).value) || 0;
            let sp = parseInt(document.getElementById(`sp_${i}`).value) || 0;
            sumaEV += ev;
            sumaSP += sp;
            sumaVP += (sp * 5);
        }

        const chkAbility = document.getElementById('chkAbility').checked;
        const chkNature = document.getElementById('chkNature').checked;
        let numMoves = parseInt(document.getElementById('numMoves').value) || 0;

        if (numMoves > 4) { numMoves = 4; document.getElementById('numMoves').value = 4; }
        if (numMoves < 0) { numMoves = 0; document.getElementById('numMoves').value = 0; }

        if (chkAbility) sumaVP += 500;
        if (chkNature)  sumaVP += 500;
        sumaVP += (numMoves * 250);

        document.getElementById('sumaEVs').innerText = sumaEV;
        const spanSPs = document.getElementById('sumaSPs');
        spanSPs.innerText = sumaSP;
        document.getElementById('sumaVPs').innerText = sumaVP;

        // Lógica visual para la validación del límite de 66 SP
        const warningSP = document.getElementById('warningSP');
        const mainPanel = document.getElementById('mainTotalsPanel');

        if (sumaSP > 66) {
            spanSPs.classList.add('error-limit');
            warningSP.style.display = 'inline';
            mainPanel.classList.add('panel-error');
        } else {
            spanSPs.classList.remove('error-limit');
            warningSP.style.display = 'none';
            mainPanel.classList.remove('panel-error');
        }
    }

    function reiniciarStats() {
        for (let i = 0; i < 6; i++) {
            document.getElementById(`ev_${i}`).value = "";
            document.getElementById(`sp_${i}`).value = "";
            document.getElementById(`vp_${i}`).innerText = "0 VP";
        }
        
        document.getElementById('chkAbility').checked = false;
        document.getElementById('chkNature').checked = false;
        document.getElementById('numMoves').value = "0";

        actualizarTotales();
    }

    inicializarCuadricula();
</script>

</body>
</html>
